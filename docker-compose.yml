services:

  db:
    image: mysql:8.0
    container_name: crafthub-db
    restart: always
    environment:
      MYSQL_DATABASE: crafthub
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: crafthub-backend
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/crafthub?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      UPLOAD_PATH: /app/uploads
    volumes:
      - ./uploads:/app/uploads

  frontend:
    build: ./frontend
    container_name: crafthub-frontend
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  db_data: